# ============================================================
# NxtHire.ai QA — GitHub Actions CI/CD Pipeline
# Runs Playwright tests on every push to main
# Publishes Allure report to GitHub Pages automatically
# ============================================================

name: NxtHire QA Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:   # allows manual trigger from GitHub UI

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # Step 1 — Check out the code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2 — Set up Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Step 3 — Install dependencies
      - name: Install dependencies
        run: npm ci

      # Step 4 — Install Playwright browsers (Chrome only)
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      # Step 5 — Install Allure CLI
      - name: Install Allure CLI
        run: npm install -g allure-commandline --save-dev

      # Step 6 — Run all test suites
      - name: Run Playwright tests
        run: npx playwright test ai-recruiter.spec.js candidates.spec.js openjobs.spec.js datasources.spec.js
        env:
          NXTHIRE_EMAIL:    ${{ secrets.NXTHIRE_EMAIL }}
          NXTHIRE_PASSWORD: ${{ secrets.NXTHIRE_PASSWORD }}
        continue-on-error: true   # continue to generate report even if tests fail

      # Step 7 — Generate Allure report
      - name: Generate Allure report
        run: allure generate allure-results --clean -o allure-report
        if: always()

      # Step 8 — Copy Allure report to docs folder for GitHub Pages
      - name: Copy report to docs
        run: |
          rm -rf docs
          cp -r allure-report docs
        if: always()

      # Step 9 — Commit and push the updated report to GitHub Pages
      - name: Deploy Allure report to GitHub Pages
        if: always()
        run: |
          git config --global user.name  "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "Auto-update Allure report [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Step 10 — Upload test results as artifact (viewable in GitHub Actions)
      - name: Upload Playwright test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-results
          path: |
            allure-results/
            allure-report/
            test-results/
          retention-days: 30
